name: m2m
description: "Production-oriented Flutter client for the M2M chat platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  image_picker: ^1.1.2
  file_picker: ^10.3.2
  intl: ^0.20.2
  url_launcher: ^6.3.2
  video_player: ^2.8.2
  dio: ^5.4.0
  dio_cache_interceptor: ^3.4.1
  pretty_dio_logger: ^1.3.1
  connectivity_plus: ^7.1.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  gal: ^2.3.2
  record: ^6.1.1
  audioplayers: ^6.5.1
  web_socket_channel: ^3.0.3
  mobile_scanner: ^7.1.2
  firebase_core: ^4.1.0
  firebase_messaging: ^16.0.1
  flutter_local_notifications: ^19.4.0
  cached_network_image: ^3.3.1
  qr_flutter: ^4.1.0
  fast_contacts: ^4.0.0
  flutter_contacts: ^1.1.9+2
  audio_waveforms: ^1.0.5
  open_filex: ^4.3.4
  photo_view: ^0.14.0
  flutter_staggered_animations: ^1.1.1
  emoji_picker_flutter: ^3.0.0
  livekit_client: ^2.7.0
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  stream_channel: ^2.1.4
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  drift_dev: ^2.24.0
  build_runner: ^2.4.15

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/linked_devices.png
    - assets/web_empty_state.png
    - assets/sounds/
